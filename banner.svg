<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2540"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2540"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Subtle horizontal rule dividing left / right -->
  <line x1="440" y1="40" x2="440" y2="280" stroke="#1e293b" stroke-width="1"/>

  <!-- ======== LEFT: Title block ======== -->

  <!-- Cyan accent bar -->
  <rect x="44" y="72" width="4" height="148" rx="2" fill="#38bdf8"/>

  <!-- Title -->
  <text x="64" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">LoRaWAN Sensor Network</text>

  <!-- Subtitle row 1 -->
  <text x="64" y="148" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" fill="#94a3b8">STM32WL55JC1 · Rust + Embassy · no_std</text>

  <!-- Subtitle row 2 -->
  <text x="64" y="174" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#64748b">AU915 · RAK7268V2 · InfluxDB · Grafana</text>

  <!-- Pills -->
  <!-- 2 Nodes -->
  <rect x="64" y="198" width="82" height="26" rx="13" fill="#0f2540" stroke="#38bdf8" stroke-width="1"/>
  <text x="105" y="215" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">2 Nodes</text>

  <!-- OTAA -->
  <rect x="154" y="198" width="58" height="26" rx="13" fill="#0f2540" stroke="#38bdf8" stroke-width="1"/>
  <text x="183" y="215" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">OTAA</text>

  <!-- AU915 -->
  <rect x="220" y="198" width="62" height="26" rx="13" fill="#0f2540" stroke="#38bdf8" stroke-width="1"/>
  <text x="251" y="215" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">AU915</text>

  <!-- Rust -->
  <rect x="290" y="198" width="56" height="26" rx="13" fill="#2a1200" stroke="#f97316" stroke-width="1"/>
  <text x="318" y="215" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#f97316" text-anchor="middle">Rust</text>

  <!-- Embassy -->
  <rect x="354" y="198" width="70" height="26" rx="13" fill="#0f2540" stroke="#818cf8" stroke-width="1"/>
  <text x="389" y="215" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Embassy</text>


  <!-- ======== RIGHT: Data flow diagram ======== -->
  <!-- Centred at y=160. Nodes at y=110 and y=210. -->

  <!-- lora-1 node box -->
  <rect x="464" y="88" width="84" height="44" rx="6" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="506" y="107" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">lora-1</text>
  <text x="506" y="123" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SHT41 Sensor</text>

  <!-- lora-2 node box -->
  <rect x="464" y="188" width="84" height="44" rx="6" fill="url(#nodeGrad)" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="506" y="207" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">lora-2</text>
  <text x="506" y="223" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Range Probe</text>

  <!-- Lines from nodes converging to radio wave origin -->
  <line x1="548" y1="110" x2="596" y2="160" stroke="#334155" stroke-width="1.2"/>
  <line x1="548" y1="210" x2="596" y2="160" stroke="#334155" stroke-width="1.2"/>

  <!-- Radio waves (arcs opening rightward, centred at 596,160) -->
  <path d="M596,160 m0,-16 a16,16 0 0,1 0,32" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M596,160 m0,-28 a28,28 0 0,1 0,56" fill="none" stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M596,160 m0,-40 a40,40 0 0,1 0,80" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- "AU915" label under waves -->
  <text x="615" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">AU915 · SF12</text>

  <!-- Gateway box -->
  <rect x="650" y="138" width="90" height="44" rx="6" fill="url(#gwGrad)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="695" y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">RAK GW</text>
  <text x="695" y="173" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">7268V2</text>

  <!-- Arrow GW → InfluxDB -->
  <line x1="742" y1="160" x2="786" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- "MQTT" label over arrow -->
  <text x="764" y="153" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">MQTT</text>

  <!-- InfluxDB box -->
  <rect x="790" y="138" width="90" height="44" rx="6" fill="url(#gwGrad)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="835" y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">InfluxDB</text>
  <text x="835" y="173" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">time-series</text>

  <!-- Arrow InfluxDB → Grafana -->
  <line x1="882" y1="160" x2="926" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Grafana box -->
  <rect x="930" y="138" width="90" height="44" rx="6" fill="url(#gwGrad)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="975" y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">Grafana</text>
  <text x="975" y="173" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">dashboard</text>

  <!-- Bottom label row -->
  <text x="695" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">10.10.10.254</text>
  <text x="835" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">Docker</text>
  <text x="975" y="270" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">10s refresh</text>

</svg>
